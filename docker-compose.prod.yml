services:
  # Настройки RoadRunner для Production
  laravel-roadrunner:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
      target: production
    image: laravel-roadrunner:latest
    container_name: laravel-roadrunner
    pull_policy: never
    restart: unless-stopped
    environment:
      APP_KEY: ${APP_KEY}
      APP_BASE_PATH: ${APP_BASE_PATH}
    working_dir: /var/www/laravel
    command: >
      sh -c "
        php artisan migrate --force &&
        php artisan optimize:clear &&
        rr serve -c /var/www/laravel/.rr.yaml -w /var/www/laravel
      "
    networks:
      - laravel-roadrunner-network
    depends_on:
      laravel-postgres-rr:
        condition: service_healthy
      laravel-redis-rr:
        condition: service_healthy
    healthcheck:
      test: >-
        curl --silent --show-error --fail --max-time 3 --noproxy '*'
        http://127.0.0.1:2114/health?plugin=http >/dev/null
        || curl --silent --show-error --fail --max-time 3 --noproxy '*'
        http://127.0.0.1:8000/up >/dev/null
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 35s

  # База данных PostgreSQL
  laravel-postgres-rr:
    image: postgres:18.2-alpine
    container_name: laravel-postgres-rr
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - laravel-roadrunner-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Хранилище данных Redis
  laravel-redis-rr:
    image: redis:8.6-alpine
    container_name: laravel-redis-rr
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis-data:/data
    networks:
      - laravel-roadrunner-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Queue Worker — обработка очередей Laravel
  laravel-queue-rr:
    image: laravel-roadrunner:latest
    container_name: laravel-queue-rr
    pull_policy: never
    restart: unless-stopped
    environment:
      APP_KEY: ${APP_KEY}
      APP_BASE_PATH: ${APP_BASE_PATH}
    working_dir: /var/www/laravel
    command: [ "php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600", "--memory=256", "--max-jobs=1000" ]
    networks:
      - laravel-roadrunner-network
    depends_on:
      laravel-postgres-rr:
        condition: service_healthy
      laravel-redis-rr:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "ps aux | grep -v grep | grep 'queue:work' >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Scheduler — планировщик задач Laravel (cron)
  laravel-scheduler-rr:
    image: laravel-roadrunner:latest
    container_name: laravel-scheduler-rr
    pull_policy: never
    restart: unless-stopped
    environment:
      APP_KEY: ${APP_KEY}
      APP_BASE_PATH: ${APP_BASE_PATH}
    working_dir: /var/www/laravel
    command: [ "sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done" ]
    networks:
      - laravel-roadrunner-network
    depends_on:
      laravel-postgres-rr:
        condition: service_healthy
      laravel-redis-rr:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:

networks:
  laravel-roadrunner-network:
    driver: bridge
